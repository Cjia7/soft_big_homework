<script>
  // 禁止鼠标滚轮缩放
  window.addEventListener('wheel', function(event) {
    if (event.ctrlKey) {
      event.preventDefault();
    }
  }, { passive: false });

  // 禁止触摸缩放
  window.addEventListener('touchmove', function(event) {
    if (event.scale !== 1) { event.preventDefault(); }
  }, { passive: false });
</script>
